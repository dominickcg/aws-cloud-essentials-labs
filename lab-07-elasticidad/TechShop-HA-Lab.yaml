        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${AWS::StackName}-ec2'

  # ==================== AUTO SCALING GROUP ====================

  # Auto Scaling Group que gestiona las instancias EC2 de TechShop.
  # Mantiene minimo 2 instancias distribuidas en 2 AZs para alta disponibilidad.
  # Usa health check ELB para reemplazar instancias que no respondan al ALB.
  # DependsOn EFS Mount Targets para garantizar que EFS este listo antes de lanzar instancias.
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      - EFSMountTargetA
      - EFSMountTargetB
    Properties:
      AutoScalingGroupName: !Sub '${AWS::StackName}-asg'
      MinSize: '2'
      MaxSize: '4'
      DesiredCapacity: '2'
      VPCZoneIdentifier:
        - !Ref PublicSubnetAId
        - !Ref PublicSubnetBId
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2'
          PropagateAtLaunch: true

  # ==================== CLOUDFRONT ====================

  # Origin Access Control (OAC) para restringir el acceso al bucket S3.
  # Usa OAC (no el legacy OAI) siguiendo las mejores practicas actuales de AWS.
  # SigningBehavior: always asegura que todas las solicitudes al origen S3 esten firmadas con SigV4.
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Distribucion CloudFront con 2 origenes:
  # 1. ALB (default): contenido dinamico de la aplicacion web TechShop
  # 2. S3 (path patterns /assets/* y /images/*): contenido estatico con caching optimizado
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        WebACLId: !GetAtt WAFWebACL.Arn
        Comment: !Sub '${AWS::StackName} - TechShop HA Distribution'
        Origins:
          - Id: ALBOrigin
            DomainName: !GetAtt ApplicationLoadBalancer.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
          - Id: S3Origin
            DomainName: !GetAtt S3Bucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: ALBOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: '4135ea2d-6df8-44a3-9df3-4b5a84be39ad'
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          Compress: true
        CacheBehaviors:
          - PathPattern: '/assets/*'
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: '658327ea-f89d-4fab-a63d-7e88639e58f6'
            AllowedMethods:
              - GET
              - HEAD
            Compress: true
          - PathPattern: '/images/*'
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: '658327ea-f89d-4fab-a63d-7e88639e58f6'
            AllowedMethods:
              - GET
              - HEAD
            Compress: true

  # ==================== S3 BUCKET POLICY ====================

  # Politica del bucket S3 que restringe el acceso exclusivamente a traves de CloudFront OAC.
  # Usa la condicion StringEquals en AWS:SourceArn para verificar que las solicitudes
  # provengan unicamente de la distribucion CloudFront asociada, impidiendo cualquier
  # acceso directo al bucket S3 desde Internet u otros origenes.
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${S3Bucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ==================== WAF ====================

  # WAF WebACL con scope CLOUDFRONT para proteccion perimetral en el edge.
  # Filtra trafico malicioso antes de que llegue a la infraestructura de origen.
  # Usa AWSManagedRulesCommonRuleSet que protege contra los ataques web mas comunes
  # (SQL injection, XSS, etc.) segun OWASP Top 10.
  # Scope CLOUDFRONT requiere que la pila se despliegue en us-east-1.
  WAFWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${AWS::StackName}-waf'
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${AWS::StackName}-waf-metrics'
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${AWS::StackName}-common-rules'

  # ==================== CLOUDWATCH ====================

  # Dashboard de CloudWatch con 4 widgets para monitorear los componentes clave
  # de la arquitectura HA: CPU de EC2, solicitudes al ALB, tiempo de respuesta
  # del ALB y conexiones a la base de datos RDS.
  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${AWS::StackName}-dashboard'
      DashboardBody:
        Fn::Sub: |
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "EC2 CPU Utilization",
                  "metrics": [
                    ["AWS/EC2", "CPUUtilization", "AutoScalingGroupName", "${AutoScalingGroup}"]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "region": "${AWS::Region}"
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "ALB Request Count",
                  "metrics": [
                    ["AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${ApplicationLoadBalancer.LoadBalancerFullName}"]
                  ],
                  "period": 300,
                  "stat": "Sum",
                  "region": "${AWS::Region}"
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "ALB Target Response Time",
                  "metrics": [
                    ["AWS/ApplicationELB", "TargetResponseTime", "LoadBalancer", "${ApplicationLoadBalancer.LoadBalancerFullName}"]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "region": "${AWS::Region}"
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "title": "RDS Database Connections",
                  "metrics": [
                    ["AWS/RDS", "DatabaseConnections", "DBInstanceIdentifier", "${RDSInstance}"]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "region": "${AWS::Region}"
                }
              }
            ]
          }

  # Alarma de CloudWatch que se activa cuando la utilizacion de CPU promedio
  # del Auto Scaling Group supera el 80% durante 2 periodos consecutivos de 5 minutos.
  # Indica que las instancias estan bajo carga alta y podrian necesitar escalado.
  CPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-cpu-high'
      AlarmDescription: Alarma cuando CPU supera 80% en el Auto Scaling Group
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold

  # Alarma de CloudWatch que se activa cuando el numero de errores HTTP 5xx
  # del ALB supera 10 en un periodo de 5 minutos.
  # Indica problemas en las instancias backend o en la aplicacion.
  ALB5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-5xx-errors'
      AlarmDescription: Alarma cuando errores 5xx superan 10 en el ALB
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold

# ==================== OUTPUTS ====================

Outputs:
  CloudFrontURL:
    Description: URL de la distribucion CloudFront para acceder a TechShop
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
