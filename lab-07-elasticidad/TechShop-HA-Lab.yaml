AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  TechShop - Arquitectura de Alta Disponibilidad.
  Despliega la arquitectura HA completa de TechShop (~25 recursos) incluyendo
  ALB, Auto Scaling, RDS Multi-AZ, EFS, CloudFront con OAC, WAF y CloudWatch.
  Recibe la infraestructura de red compartida (VPC, subredes) como parametros
  desde la plantilla del instructor (TechShop-Instructor-Infra.yaml).

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID de la VPC de la infraestructura compartida del instructor

  PublicSubnetAId:
    Type: AWS::EC2::Subnet::Id
    Description: ID de la subred publica en us-east-1a

  PublicSubnetBId:
    Type: AWS::EC2::Subnet::Id
    Description: ID de la subred publica en us-east-1b

  PrivateSubnetAId:
    Type: AWS::EC2::Subnet::Id
    Description: ID de la subred privada en us-east-1a

  PrivateSubnetBId:
    Type: AWS::EC2::Subnet::Id
    Description: ID de la subred privada en us-east-1b

  DBMasterPassword:
    Type: String
    Description: Contrasena del usuario administrador de la base de datos RDS
    Default: TechShop2024!
    NoEcho: true
    MinLength: 8

Resources:
  # ==================== SECURITY GROUPS ====================

  # SG-ALB: Permite trafico HTTP/HTTPS desde Internet hacia el ALB.
  # Outbound restringido: solo TCP 80 hacia las instancias EC2.
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg-alb'
      GroupDescription: Security group para el Application Load Balancer - permite HTTP/HTTPS desde Internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP desde Internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS desde Internet
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg-alb'

  # SG-EC2: Permite trafico HTTP desde el ALB y NFS desde EFS.
  # Outbound restringido: NFS hacia EFS, MySQL hacia RDS, HTTPS hacia Internet (APIs S3/CloudWatch).
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg-ec2'
      GroupDescription: Security group para instancias EC2 - permite HTTP desde ALB y NFS desde EFS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: HTTP desde el ALB
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg-ec2'

  # SG-RDS: Permite trafico MySQL exclusivamente desde las instancias EC2.
  # Sin reglas outbound custom (RDS solo responde a conexiones establecidas).
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg-rds'
      GroupDescription: Security group para RDS MySQL - permite MySQL desde instancias EC2
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: MySQL desde instancias EC2
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg-rds'

  # SG-EFS: Permite trafico NFS exclusivamente desde las instancias EC2.
  # Sin reglas outbound custom (EFS solo responde a conexiones establecidas).
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-sg-efs'
      GroupDescription: Security group para EFS - permite NFS desde instancias EC2
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: NFS desde instancias EC2
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg-efs'

  # Regla de outbound del ALB: solo TCP 80 hacia SG-EC2.
  # Se define SecurityGroupEgress en el ALB para restringir el trafico saliente.
  ALBSecurityGroupEgressToEC2:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      DestinationSecurityGroupId: !Ref EC2SecurityGroup
      Description: HTTP hacia instancias EC2

  # Reglas de outbound del EC2: NFS hacia EFS, MySQL hacia RDS, HTTPS hacia Internet.
  EC2SecurityGroupEgressToEFS:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      DestinationSecurityGroupId: !Ref EFSSecurityGroup
      Description: NFS hacia EFS

  EC2SecurityGroupEgressToRDS:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      DestinationSecurityGroupId: !Ref RDSSecurityGroup
      Description: MySQL hacia RDS

  EC2SecurityGroupEgressToInternet:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: HTTPS hacia Internet para APIs de S3 y CloudWatch

  # Regla separada AWS::EC2::SecurityGroupIngress para evitar dependencia circular.
  # Permite NFS (TCP 2049) desde SG-EFS hacia SG-EC2.
  EC2IngressFromEFS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref EFSSecurityGroup
      Description: NFS desde EFS (regla separada para evitar dependencia circular)

  # ==================== IAM ROLE & INSTANCE PROFILE ====================

  # Rol IAM para instancias EC2: permite acceso a S3 (imagenes de productos)
  # y CloudWatch (metricas y logs) siguiendo el principio de minimo privilegio.
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub '${AWS::StackName}-ec2-s3-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${S3Bucket.Arn}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt S3Bucket.Arn
        - PolicyName: !Sub '${AWS::StackName}-ec2-cloudwatch-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2-role'

  # Perfil de instancia que asocia el rol IAM a las instancias EC2
  # del Launch Template y Auto Scaling Group.
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-ec2-profile'
      Roles:
        - !Ref EC2Role

  # ==================== EFS ====================

  # Sistema de archivos EFS compartido entre instancias EC2.
  # Cifrado habilitado y modo de rendimiento generalPurpose para cargas web.
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'

  # Mount Target en subred privada A para que las instancias EC2
  # en us-east-1a puedan montar el sistema de archivos EFS.
  EFSMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnetAId
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # Mount Target en subred privada B para que las instancias EC2
  # en us-east-1b puedan montar el sistema de archivos EFS.
  EFSMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnetBId
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # ==================== S3 ====================

  # Bucket S3 para almacenar imagenes de productos y activos estaticos.
  # PublicAccessBlock completamente bloqueado; el acceso se otorga exclusivamente
  # a traves de CloudFront OAC.
  # Nota: La BucketPolicy se agrega despues de definir la distribucion CloudFront (tarea 5.2).
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-assets'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-assets'

  # ==================== RDS ====================

  # Grupo de subredes para RDS Multi-AZ.
  # Incluye ambas subredes privadas para permitir la replicacion sincrona
  # entre zonas de disponibilidad.
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Grupo de subredes para RDS Multi-AZ
      SubnetIds:
        - !Ref PrivateSubnetAId
        - !Ref PrivateSubnetBId
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-db-subnet-group'

  # Instancia RDS MySQL Multi-AZ para la base de datos de TechShop.
  # Multi-AZ habilitado: AWS mantiene una replica sincrona en otra AZ
  # con failover automatico en caso de fallo de la instancia primaria.
  # Nota: Las credenciales se reciben como parametro con NoEcho por simplicidad del laboratorio.
  # En produccion se usaria AWS Secrets Manager (ManageMasterUserPassword: true).
  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: mysql
      EngineVersion: '8.0.44'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: '20'
      StorageType: gp2
      MultiAZ: true
      MasterUsername: admin
      MasterUserPassword: !Ref DBMasterPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      DBInstanceIdentifier: !Sub '${AWS::StackName}-mysql'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-mysql'

  # ==================== ALB ====================

  # Application Load Balancer internet-facing en subredes publicas.
  # Distribuye el trafico HTTP entre las instancias EC2 del Auto Scaling Group.
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${AWS::StackName}-alb'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetAId
        - !Ref PublicSubnetBId
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-alb'

  # Target Group para las instancias EC2 del Auto Scaling Group.
  # Health check en la raiz (/) cada 30 segundos para verificar la salud de las instancias.
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AWS::StackName}-tg'
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-tg'

  # Listener HTTP en puerto 80 que reenvía el trafico al Target Group.
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ==================== LAUNCH TEMPLATE ====================

  # Launch Template para las instancias EC2 del Auto Scaling Group.
  # Configura AL2023, instala Apache, monta EFS, despliega la webapp TechShop
  # y sube imagenes de productos al bucket S3 (una sola vez via flag en EFS).
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${AWS::StackName}-lt'
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        InstanceType: t2.micro
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        IamInstanceProfile:
          Name: !Ref EC2InstanceProfile
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            yum update -y
            yum install -y httpd amazon-efs-utils

            # Habilitar Apache para inicio automatico
            systemctl enable httpd

            # Montar EFS
            mkdir -p /mnt/efs
            mount -t efs ${EFSFileSystem}:/ /mnt/efs

            # Agregar EFS a /etc/fstab para persistencia tras reinicios
            echo "${EFSFileSystem}:/ /mnt/efs efs defaults,_netdev 0 0" >> /etc/fstab

            # ===== Crear aplicacion web TechShop en /var/www/html/ =====

            mkdir -p /var/www/html/css
            mkdir -p /var/www/html/js
            mkdir -p /var/www/html/images

            # --- index.html ---
            cat > /var/www/html/index.html << 'HTMLEOF'
            <!DOCTYPE html>
            <html lang="es">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TechShop - Tienda de Tecnologia</title>
              <link rel="stylesheet" href="css/styles.css">
            </head>
            <body>
              <header class="header">
                <div class="container">
                  <div class="logo">TechShop</div>
                  <nav class="nav">
                    <a href="index.html" class="nav-link active">Inicio</a>
                    <a href="productos.html" class="nav-link">Productos</a>
                  </nav>
                </div>
              </header>
              <main>
                <section class="hero">
                  <div class="container">
                    <h1>Bienvenido a TechShop</h1>
                    <p>Tu tienda de tecnologia con arquitectura de alta disponibilidad</p>
                    <a href="productos.html" class="btn">Ver Productos</a>
                  </div>
                </section>
                <section class="features">
                  <div class="container">
                    <h2>Nuestras Categorias</h2>
                    <div class="features-grid">
                      <div class="feature-card">
                        <h3>Computadoras</h3>
                        <p>Laptops y equipos de alto rendimiento para trabajo y entretenimiento.</p>
                      </div>
                      <div class="feature-card">
                        <h3>Smartphones</h3>
                        <p>Los ultimos modelos con la mejor tecnologia movil del mercado.</p>
                      </div>
                      <div class="feature-card">
                        <h3>Accesorios</h3>
                        <p>Audifonos, tablets, smartwatches y camaras para complementar tu vida digital.</p>
                      </div>
                    </div>
                  </div>
                </section>
                <section class="info">
                  <div class="container">
                    <h2>Arquitectura de Alta Disponibilidad</h2>
                    <p>Esta aplicacion se ejecuta sobre una arquitectura AWS altamente disponible con Auto Scaling, balanceo de carga, almacenamiento distribuido y base de datos Multi-AZ.</p>
                  </div>
                </section>
              </main>
              <footer class="footer">
                <div class="container">
                  <p>TechShop - Laboratorio de Alta Disponibilidad en AWS</p>
                </div>
              </footer>
              <script src="js/app.js"></script>
            </body>
            </html>
            HTMLEOF

            # --- productos.html ---
            cat > /var/www/html/productos.html << 'HTMLEOF'
            <!DOCTYPE html>
            <html lang="es">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Productos - TechShop</title>
              <link rel="stylesheet" href="css/styles.css">
            </head>
            <body>
              <header class="header">
                <div class="container">
                  <div class="logo">TechShop</div>
                  <nav class="nav">
                    <a href="index.html" class="nav-link">Inicio</a>
                    <a href="productos.html" class="nav-link active">Productos</a>
                  </nav>
                </div>
              </header>
              <main>
                <section class="products">
                  <div class="container">
                    <h1>Catalogo de Productos</h1>
                    <div class="products-grid">
                      <div class="product-card">
                        <img src="/images/producto-1.svg" alt="Laptop Pro X1" class="product-img">
                        <h3>Laptop Pro X1</h3>
                        <p class="product-desc">Laptop de alto rendimiento con procesador de ultima generacion.</p>
                        <p class="product-price">$1,299.99</p>
                      </div>
                      <div class="product-card">
                        <img src="/images/producto-2.svg" alt="Smartphone Ultra S" class="product-img">
                        <h3>Smartphone Ultra S</h3>
                        <p class="product-desc">Smartphone con pantalla AMOLED y camara de 108MP.</p>
                        <p class="product-price">$899.99</p>
                      </div>
                      <div class="product-card">
                        <img src="/images/producto-3.svg" alt="Audifonos CloudBass" class="product-img">
                        <h3>Audifonos CloudBass</h3>
                        <p class="product-desc">Audifonos inalambricos con cancelacion de ruido activa.</p>
                        <p class="product-price">$249.99</p>
                      </div>
                      <div class="product-card">
                        <img src="/images/producto-4.svg" alt="Tablet Vision 12" class="product-img">
                        <h3>Tablet Vision 12</h3>
                        <p class="product-desc">Tablet con pantalla de 12 pulgadas ideal para productividad.</p>
                        <p class="product-price">$649.99</p>
                      </div>
                      <div class="product-card">
                        <img src="/images/producto-5.svg" alt="SmartWatch Pulse" class="product-img">
                        <h3>SmartWatch Pulse</h3>
                        <p class="product-desc">Reloj inteligente con monitor de salud y GPS integrado.</p>
                        <p class="product-price">$349.99</p>
                      </div>
                      <div class="product-card">
                        <img src="/images/producto-6.svg" alt="Camara ProShot 4K" class="product-img">
                        <h3>Camara ProShot 4K</h3>
                        <p class="product-desc">Camara digital con grabacion 4K y estabilizacion optica.</p>
                        <p class="product-price">$799.99</p>
                      </div>
                    </div>
                  </div>
                </section>
              </main>
              <footer class="footer">
                <div class="container">
                  <p>TechShop - Laboratorio de Alta Disponibilidad en AWS</p>
                </div>
              </footer>
              <script src="js/app.js"></script>
            </body>
            </html>
            HTMLEOF

            # --- css/styles.css ---
            cat > /var/www/html/css/styles.css << 'CSSEOF'
            *, *::before, *::after {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
            }
            body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
              color: #1a1a2e;
              background-color: #f5f5f5;
              line-height: 1.6;
            }
            .container {
              max-width: 1200px;
              margin: 0 auto;
              padding: 0 20px;
            }
            /* Header */
            .header {
              background-color: #0f3460;
              color: #ffffff;
              padding: 16px 0;
            }
            .header .container {
              display: flex;
              justify-content: space-between;
              align-items: center;
            }
            .logo {
              font-size: 1.8rem;
              font-weight: 700;
              letter-spacing: 1px;
            }
            .nav {
              display: flex;
              gap: 24px;
            }
            .nav-link {
              color: #c4c4c4;
              text-decoration: none;
              font-weight: 500;
              transition: color 0.2s;
            }
            .nav-link:hover, .nav-link.active {
              color: #e94560;
            }
            /* Hero */
            .hero {
              background: linear-gradient(135deg, #0f3460, #16213e);
              color: #ffffff;
              text-align: center;
              padding: 80px 20px;
            }
            .hero h1 {
              font-size: 2.5rem;
              margin-bottom: 16px;
            }
            .hero p {
              font-size: 1.2rem;
              margin-bottom: 32px;
              color: #c4c4c4;
            }
            .btn {
              display: inline-block;
              background-color: #e94560;
              color: #ffffff;
              padding: 14px 32px;
              border-radius: 6px;
              text-decoration: none;
              font-weight: 600;
              transition: background-color 0.2s;
            }
            .btn:hover {
              background-color: #c73e54;
            }
            /* Features */
            .features {
              padding: 60px 20px;
              text-align: center;
            }
            .features h2 {
              font-size: 2rem;
              margin-bottom: 40px;
              color: #0f3460;
            }
            .features-grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
              gap: 24px;
            }
            .feature-card {
              background: #ffffff;
              border-radius: 8px;
              padding: 32px 24px;
              box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            }
            .feature-card h3 {
              color: #0f3460;
              margin-bottom: 12px;
              font-size: 1.3rem;
            }
            .feature-card p {
              color: #555;
            }
            /* Info */
            .info {
              background-color: #16213e;
              color: #ffffff;
              padding: 60px 20px;
              text-align: center;
            }
            .info h2 {
              font-size: 1.8rem;
              margin-bottom: 16px;
            }
            .info p {
              color: #c4c4c4;
              max-width: 700px;
              margin: 0 auto;
            }
            /* Products */
            .products {
              padding: 60px 20px;
            }
            .products h1 {
              text-align: center;
              font-size: 2rem;
              margin-bottom: 40px;
              color: #0f3460;
            }
            .products-grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
              gap: 24px;
            }
            .product-card {
              background: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              box-shadow: 0 2px 8px rgba(0,0,0,0.08);
              transition: transform 0.2s, box-shadow 0.2s;
            }
            .product-card:hover {
              transform: translateY(-4px);
              box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            }
            .product-img {
              width: 100%;
              height: 200px;
              object-fit: cover;
              background-color: #e8e8e8;
            }
            .product-card h3 {
              padding: 16px 16px 4px;
              color: #0f3460;
            }
            .product-desc {
              padding: 0 16px;
              color: #555;
              font-size: 0.95rem;
            }
            .product-price {
              padding: 12px 16px 16px;
              color: #e94560;
              font-size: 1.3rem;
              font-weight: 700;
            }
            /* Footer */
            .footer {
              background-color: #0f3460;
              color: #c4c4c4;
              text-align: center;
              padding: 24px 20px;
              margin-top: 40px;
            }
            /* Responsive */
            @media (max-width: 768px) {
              .hero h1 { font-size: 1.8rem; }
              .hero p { font-size: 1rem; }
              .header .container { flex-direction: column; gap: 12px; }
              .nav { gap: 16px; }
              .products-grid { grid-template-columns: 1fr; }
            }
            CSSEOF

            # --- js/app.js ---
            cat > /var/www/html/js/app.js << 'JSEOF'
            (function() {
              "use strict";

              // Resaltar enlace de navegacion activo segun la pagina actual
              function setActiveNav() {
                var path = window.location.pathname;
                var links = document.querySelectorAll(".nav-link");
                links.forEach(function(link) {
                  link.classList.remove("active");
                  var href = link.getAttribute("href");
                  if (path.endsWith(href) || (path === "/" && href === "index.html")) {
                    link.classList.add("active");
                  }
                });
              }

              // Animacion sencilla de aparicion para tarjetas de productos
              function animateCards() {
                var cards = document.querySelectorAll(".product-card, .feature-card");
                if (!cards.length) return;
                var observer = new IntersectionObserver(function(entries) {
                  entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                      entry.target.style.opacity = "1";
                      entry.target.style.transform = "translateY(0)";
                      observer.unobserve(entry.target);
                    }
                  });
                }, { threshold: 0.1 });
                cards.forEach(function(card) {
                  card.style.opacity = "0";
                  card.style.transform = "translateY(20px)";
                  card.style.transition = "opacity 0.4s ease, transform 0.4s ease";
                  observer.observe(card);
                });
              }

              document.addEventListener("DOMContentLoaded", function() {
                setActiveNav();
                animateCards();
              });
            })();
            JSEOF

