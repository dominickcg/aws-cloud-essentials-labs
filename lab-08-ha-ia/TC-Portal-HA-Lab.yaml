            # Crear página de resoluciones
            cat > resoluciones.html << 'EOF'
            <!DOCTYPE html>
            <html lang="es">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Resoluciones - Portal TC</title>
                <link rel="stylesheet" href="css/styles.css">
            </head>
            <body>
                <header>
                    <h1>🏛️ Portal del Ciudadano</h1>
                    <h2>Tribunal Constitucional</h2>
                </header>
                <nav>
                    <ul>
                        <li><a href="index.html">Inicio</a></li>
                        <li><a href="chatbot.html">Asistente Constitucional</a></li>
                        <li><a href="resoluciones.html">Resoluciones</a></li>
                    </ul>
                </nav>
                <main>
                    <div class="resolucion-container">
                        <h3>Últimas Resoluciones</h3>
                        <h4>Expediente N° 001-2026 - Habeas Corpus</h4>
                        <div class="resolucion-text" id="resolucionText">
                            <p>El Tribunal Constitucional, en sesión de Pleno Jurisdiccional, ha resuelto declarar FUNDADO el recurso de Habeas Corpus interpuesto por el ciudadano en defensa de su libertad individual. Se ha determinado que existió una vulneración al derecho fundamental a la libertad personal consagrado en el artículo 2 inciso 24 de la Constitución Política. En consecuencia, se ordena la inmediata libertad del recurrente y se dispone que las autoridades competentes adopten las medidas necesarias para garantizar el pleno ejercicio de sus derechos constitucionales.</p>
                        </div>
                        <div class="audio-controls">
                            <button class="btn" onclick="playAudio()">▶ Escuchar Resumen</button>
                            <audio id="audioPlayer" controls style="display:none; margin-top: 1rem; width: 100%;"></audio>
                        </div>
                    </div>
                </main>
                <footer>
                    <p>&copy; 2026 Tribunal Constitucional - Portal del Ciudadano</p>
                </footer>
                <script src="js/polly.js"></script>
            </body>
            </html>
            EOF
            
            # Crear directorio JS
            mkdir -p js
            cat > js/chatbot.js << 'EOF'
            // Enviar mensaje al asistente constitucional via Amazon Bedrock
            function sendMessage() {
                var input = document.getElementById('userInput');
                var messagesDiv = document.getElementById('chatMessages');
                var sendBtn = document.querySelector('button[onclick="sendMessage()"]');
                var userMessage = input.value.trim();

                if (!userMessage) return;

                // Mostrar mensaje del usuario
                var userDiv = document.createElement('div');
                userDiv.className = 'message user';
                userDiv.innerHTML = '<strong>Usted:</strong> ' + userMessage;
                messagesDiv.appendChild(userDiv);

                input.value = '';

                // Deshabilitar entrada mientras se procesa la consulta
                input.disabled = true;
                if (sendBtn) sendBtn.disabled = true;

                // Mostrar indicador de procesamiento
                var assistantDiv = document.createElement('div');
                assistantDiv.className = 'message assistant';
                assistantDiv.innerHTML = '<strong>Asistente:</strong> <em>Procesando su consulta con Amazon Bedrock...</em>';
                messagesDiv.appendChild(assistantDiv);

                // Scroll al final
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                // Llamada real al backend que invoca Amazon Bedrock
                fetch('/api/bedrock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: userMessage })
                })
                .then(function(res) {
                    if (!res.ok) {
                        throw new Error('Error del servidor: ' + res.status);
                    }
                    return res.json();
                })
                .then(function(data) {
                    assistantDiv.innerHTML = '<strong>Asistente:</strong> ' + data.response;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                })
                .catch(function() {
                    assistantDiv.innerHTML = '<strong>Asistente:</strong> Lo sentimos, no se pudo procesar su consulta. Verifique que el modelo de Amazon Bedrock esté habilitado en su cuenta.';
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                })
                .finally(function() {
                    // Rehabilitar entrada despues de recibir respuesta
                    input.disabled = false;
                    if (sendBtn) sendBtn.disabled = false;
                    input.focus();
                });
            }

            // Permitir enviar con Enter
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            EOF
            
            cat > js/polly.js << 'EOF'
            // Integración con Amazon Polly para síntesis de voz
            function playAudio() {
                var text = document.getElementById('resolucionText').innerText;
                var audioPlayer = document.getElementById('audioPlayer');
                var btn = document.querySelector('[onclick="playAudio()"]');
                var originalBtnText = btn ? btn.innerText : '';

                // Mostrar indicador de carga
                if (btn) {
                    btn.innerText = 'Generando audio con Amazon Polly...';
                    btn.disabled = true;
                }

                fetch('/api/polly', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                })
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('Error en la respuesta del servidor');
                    }
                    return response.json();
                })
                .then(function(data) {
                    // Convertir base64 a blob de audio
                    var binaryString = atob(data.audio);
                    var bytes = new Uint8Array(binaryString.length);
                    for (var i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    var blob = new Blob([bytes], { type: 'audio/mpeg' });
                    var audioUrl = URL.createObjectURL(blob);

                    // Asignar audio al reproductor y reproducir
                    audioPlayer.src = audioUrl;
                    audioPlayer.style.display = 'block';
                    audioPlayer.play();
                })
                .catch(function(error) {
                    console.error('Error al generar audio con Polly:', error);
                    alert('No se pudo generar el audio. Verifique que Amazon Polly esté disponible en su región.');
                })
                .then(function() {
                    // Restaurar botón siempre al finalizar
                    if (btn) {
                        btn.innerText = originalBtnText;
                        btn.disabled = false;
                    }
                });
            }
            EOF
            
            # ==================== BACKEND NODE.JS ====================
            # Crear directorio del backend
            mkdir -p /opt/tc-backend
            
            # Crear package.json
            cat > /opt/tc-backend/package.json << 'EOF'
            {
              "name": "tc-backend",
              "version": "1.0.0",
              "description": "Backend API del Portal del Tribunal Constitucional",
              "main": "server.js",
              "dependencies": {
                "@aws-sdk/client-bedrock-runtime": "^3.0.0",
                "@aws-sdk/client-polly": "^3.0.0",
                "express": "^4.18.0",
                "cors": "^2.8.0"
              }
            }
            EOF
            
            # Crear servidor Express
            cat > /opt/tc-backend/server.js << 'SERVEREOF'
            // Servidor backend del Portal del Tribunal Constitucional
            // Provee endpoints para integración con Amazon Bedrock y Amazon Polly
            
            var express = require('express');
            var cors = require('cors');
            var BedrockRuntime = require('@aws-sdk/client-bedrock-runtime');
            var Polly = require('@aws-sdk/client-polly');
            
            var app = express();
            app.use(cors());
            app.use(express.json());
            
            // Clientes de AWS SDK (la región se detecta automáticamente en EC2)
            var bedrockClient = new BedrockRuntime.BedrockRuntimeClient({});
            var pollyClient = new Polly.PollyClient({});
            
            // Prompt de contexto constitucional para el asistente de IA
            var SYSTEM_PROMPT = 'Eres un asistente legal del Tribunal Constitucional. ' +
              'Tu función es explicar conceptos constitucionales en lenguaje sencillo ' +
              'para que cualquier ciudadano pueda entenderlos. ' +
              'Responde siempre en español, de forma clara y concisa. ' +
              'Basa tus respuestas en principios de derecho constitucional general.';
            
            // POST /api/bedrock — Consulta al asistente de IA con Amazon Bedrock
            app.post('/api/bedrock', async function(req, res) {
              try {
                var question = req.body.question;
                if (!question) {
                  return res.status(400).json({ error: 'Se requiere el campo question' });
                }
            
                // Construir el cuerpo de la solicitud para Amazon Titan Text Express
                var requestBody = JSON.stringify({
                  inputText: SYSTEM_PROMPT + '\n\nPregunta del ciudadano: ' + question,
                  textGenerationConfig: {
                    maxTokenCount: 1024,
                    temperature: 0.7,
                    topP: 0.9
                  }
                });
            
                var command = new BedrockRuntime.InvokeModelCommand({
                  modelId: 'amazon.titan-text-express-v1',
                  contentType: 'application/json',
                  accept: 'application/json',
                  body: requestBody
                });
            
                var response = await bedrockClient.send(command);
                var responseBody = JSON.parse(new TextDecoder().decode(response.body));
                var generatedText = responseBody.results[0].outputText;
            
                res.json({ response: generatedText });
              } catch (error) {
                console.error('Error al invocar Bedrock:', error.message);
                res.status(500).json({ error: 'Error al procesar la consulta con Amazon Bedrock' });
              }
            });
            
            // POST /api/polly — Síntesis de voz con Amazon Polly
            app.post('/api/polly', async function(req, res) {
              try {
                var text = req.body.text;
                if (!text) {
                  return res.status(400).json({ error: 'Se requiere el campo text' });
                }
            
                var command = new Polly.SynthesizeSpeechCommand({
                  Text: text,
                  Engine: 'neural',
                  VoiceId: 'Lupe',
                  OutputFormat: 'mp3',
                  LanguageCode: 'es-US'
                });
            
                var response = await pollyClient.send(command);
            
                // Convertir el audio stream a base64
                var chunks = [];
                var stream = response.AudioStream;
                for await (var chunk of stream) {
                  chunks.push(chunk);
                }
                var audioBuffer = Buffer.concat(chunks);
                var audioBase64 = audioBuffer.toString('base64');
            
                res.json({ audio: audioBase64, contentType: 'audio/mpeg' });
              } catch (error) {
                console.error('Error al invocar Polly:', error.message);
                res.status(500).json({ error: 'Error al sintetizar voz con Amazon Polly' });
              }
            });
            
            // Iniciar el servidor en puerto 3001
            var PORT = 3001;
            app.listen(PORT, function() {
              console.log('Backend del Portal TC ejecutándose en puerto ' + PORT);
            });
            SERVEREOF
            
            # Instalar dependencias del backend
            cd /opt/tc-backend && npm install
            
            # Crear servicio systemd para el backend
            cat > /etc/systemd/system/tc-backend.service << 'EOF'
            [Unit]
            Description=Backend API del Portal del Tribunal Constitucional
            After=network.target
            
            [Service]
            Type=simple
            WorkingDirectory=/opt/tc-backend
            ExecStart=/usr/bin/node /opt/tc-backend/server.js
            Restart=on-failure
            RestartSec=5
            StandardOutput=journal
            StandardError=journal
            
            [Install]
            WantedBy=multi-user.target
            EOF
            
            # Habilitar e iniciar el servicio del backend
            systemctl daemon-reload
            systemctl enable tc-backend
            systemctl start tc-backend
            
            # Configurar Apache como reverse proxy para /api
            cat > /etc/httpd/conf.d/proxy.conf << 'EOF'
            ProxyPass /api http://localhost:3001/api
            ProxyPassReverse /api http://localhost:3001/api
            EOF
            
            # Reiniciar Apache para aplicar la configuración de proxy
            systemctl restart httpd
            
            # Ajustar permisos
            chown -R apache:apache /var/www/html
            chmod -R 755 /var/www/html
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${AWS::StackName}-web-instance'

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${AWS::StackName}-alb'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref WebSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-alb'

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AWS::StackName}-tg'
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetType: instance
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-tg'

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub '${AWS::StackName}-asg'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 2
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      VPCZoneIdentifier:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      TargetGroupARNs:
        - !Ref TargetGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-asg-instance'
          PropagateAtLaunch: true


  # ==================== DATABASE RESOURCES (HA) ====================
  
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub '${AWS::StackName}-db-subnet-group'
      DBSubnetGroupDescription: Subnet group para RDS Multi-AZ del Portal TC
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-db-subnet-group'

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${AWS::StackName}-db'
      Engine: mysql
      EngineVersion: '8.0.40'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp2
      MasterUsername: admin
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${RDSSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      MultiAZ: true
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-db'

  RDSSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}-rds-secret'
      Description: Credenciales de la base de datos RDS del Portal TC
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'


  # ==================== EVENT-DRIVEN RESOURCES ====================
  
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-alertas'
      DisplayName: Alertas de Resoluciones del Tribunal Constitucional
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-alertas'

  SNSEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref SNSTopic
      Endpoint: !Ref EmailAlerts

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-expedientes'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-expedientes'

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SNSTopic

  SNSSQSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref SNSTopic
      Endpoint: !GetAtt SQSQueue.Arn
      RawMessageDelivery: true


  # ==================== SERVERLESS RESOURCES ====================
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SQSAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'

  ProcesadorExpedientes:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ProcesadorExpedientes'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          def lambda_handler(event, context):
              logger.info('Procesando mensajes de expedientes constitucionales')
              
              for record in event['Records']:
                  message_body = record['body']
                  logger.info(f'Mensaje recibido: {message_body}')
                  
                  # Aquí se procesaría el expediente
                  # Por ejemplo: guardar en base de datos, notificar, etc.
                  logger.info(f'Expediente procesado exitosamente')
              
              return {
                  'statusCode': 200,
                  'body': json.dumps('Expedientes procesados correctamente')
              }
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ProcesadorExpedientes'

  LambdaSQSEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt SQSQueue.Arn
      FunctionName: !Ref ProcesadorExpedientes
      BatchSize: 10
      Enabled: true


  # ==================== IAM ROLES FOR EC2 ====================
  
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
        - PolicyName: PollyAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - polly:SynthesizeSpeech
                  - polly:DescribeVoices
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-ec2-profile'
      Roles:
        - !Ref EC2InstanceRole

  # ==================== WAF SECURITY ====================

  WAFWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${AWS::StackName}-waf-acl'
      Scope: REGIONAL
      Description: Web ACL para proteger el Portal del Tribunal Constitucional
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${AWS::StackName}-waf-metrics'
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${AWS::StackName}-common-rules'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-waf-acl'

  WAFWebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref ApplicationLoadBalancer
      WebACLArn: !GetAtt WAFWebACL.Arn


Outputs:
  PortalURL:
    Description: URL del Application Load Balancer para acceder al Portal TC
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
    Export:
      Name: !Sub '${AWS::StackName}-PortalURL'

  SNSTopicARN:
    Description: ARN del tema SNS para alertas de resoluciones
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicARN'

  SQSQueueURL:
    Description: URL de la cola SQS para procesamiento de expedientes
    Value: !Ref SQSQueue
    Export:
      Name: !Sub '${AWS::StackName}-SQSQueueURL'

  RDSEndpoint:
    Description: Endpoint de la base de datos RDS Multi-AZ
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-RDSEndpoint'

  WAFWebACLARN:
    Description: ARN de la Web ACL de AWS WAF
    Value: !GetAtt WAFWebACL.Arn
    Export:
      Name: !Sub '${AWS::StackName}-WAFWebACLARN'
