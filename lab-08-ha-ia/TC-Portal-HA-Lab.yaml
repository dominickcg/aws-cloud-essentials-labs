            # Crear página de chatbot
            cat > chatbot.html << 'EOF'
            <!DOCTYPE html>
            <html lang="es">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Asistente Constitucional - Portal TC</title>
                <link rel="stylesheet" href="css/styles.css">
            </head>
            <body>
                <header>
                    <h1>🏛️ Portal del Ciudadano</h1>
                    <h2>Tribunal Constitucional</h2>
                </header>
                <nav>
                    <ul>
                        <li><a href="index.html">Inicio</a></li>
                        <li><a href="chatbot.html">Asistente Constitucional</a></li>
